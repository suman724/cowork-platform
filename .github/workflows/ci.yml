name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check-jsonschema
        run: pip install "check-jsonschema>=0.30,<1.0"

      - name: Validate schemas
        run: |
          for f in contracts/schemas/*.json; do
            check-jsonschema --check-metaschema "$f"
          done

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[sdk,dev]"

      - name: Ruff check
        run: ruff check generated/python/ sdk/python/ tests/python/

      - name: Ruff format check
        run: ruff format --check generated/python/ sdk/python/ tests/python/

  typecheck-python:
    name: Typecheck Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[sdk,dev]"

      - name: mypy
        run: mypy generated/python/ sdk/python/

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[sdk,dev]"

      - name: Run unit tests
        run: pytest tests/python/ -m unit -v --tb=short

  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  typecheck-typescript:
    name: Typecheck TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit
        run: npm run typecheck

  test-typescript:
    name: Test TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  check-codegen:
    name: Check Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install -e ".[sdk,dev]"

      - name: Install Node dependencies
        run: npm ci

      - name: Run codegen
        run: |
          python codegen/generate_python.py
          node codegen/generate_typescript.mjs

      - name: Verify no diff
        run: |
          git diff --exit-code generated/ || \
            (echo "::error::Generated code is out of date. Run 'make codegen' and commit." && exit 1)

  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs:
      - validate-schemas
      - lint-python
      - typecheck-python
      - test-python
      - lint-typescript
      - typecheck-typescript
      - test-typescript
      - check-codegen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python build tools
        run: pip install build

      - name: Build Python wheel
        run: python -m build

      - name: Verify Python package contents
        run: |
          pip install "$(ls dist/*.whl)[sdk]"
          python -c "from cowork_platform import ToolRequest; print('Python package OK')"
          python -c "from cowork_platform_sdk import CoworkAPIError; print('Python SDK OK')"

      - name: Install Node dependencies
        run: npm ci

      - name: Build TypeScript
        run: npx tsc

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Upload TypeScript artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typescript-dist
          path: dist/
